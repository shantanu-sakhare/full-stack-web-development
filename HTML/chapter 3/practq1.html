<!-- Creating a seo friendly website -->
<!doctype html>
<html lang="en">

<head>
    <title>SEO Friendly Website</title>
<style>/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    line-height: 1.6;
    background-color: #fff5f5;
    color: #333;
}

/* Header */
header {
    background-color: #e23744; /* Zomato red */
    color: white;
    padding: 20px 50px;

    display: flex;
    justify-content: space-between;
    align-items: center;
}

header div:first-child {
    font-size: 2rem;
    font-weight: bold;
}

nav {
    display: flex;
    gap: 20px;
}

nav a {
    color: white;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

nav a:hover {
    color: #ffd6d6;
}

/* Main Section */
main {
    max-width: 900px;
    margin: 50px auto;
    padding: 0 20px;
}

section {
    background-color: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 12px rgba(226, 55, 68, 0.15);
}

h1 {
    color: #e23744;
    margin-bottom: 15px;
    font-size: 2.5rem;
}

hr {
    border: none;
    height: 3px;
    background-color: #e23744;
    width: 120px;
    margin-bottom: 20px;
}

p {
    font-size: 1.1rem;
    color: #555;
}

/* Footer */
footer {
    background-color: #e23744;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 50px;
}</style>
</head>


<body>
    <Header>
        <div>Zomato</div>
        <div>
            <nav><a href="/home">home</a>
                <a href="/about us">about us</a>
                <a href="/contact us">contact</a>
            </nav>
        </div>

    </Header>
    <main>
        <section>
            <h1>
                SEO friendly website
            </h1>
            <hr>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Amet fuga quis mollitia autem omnis alias
                reprehenderit voluptatibus, molestiae doloribus dignissimos accusamus!</p>
        </section>


    </main>
    <Footer>
        Copyright Zomato.
    </Footer>
</body>

</html>
