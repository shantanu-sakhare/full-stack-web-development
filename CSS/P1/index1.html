<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        div{
            /* element selctor */
            color: red;
            background-color: violet;
        }
        .red{
            background-color: purple;
        }
        #gray{
            background-color: salmon;

        }
    </style>
</head>
<body>
    <div class="red">
        i am div
    </div>

    <div id="gray">
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Error quod voluptate voluptatem?
    </div>
    
</body>
</html>
